# Trigger Registry — Reactive Event Triggers
# Triggers react to external events (webhooks, integrations) and execute skills/routines.
# Unlike cron routines (config/routines.yaml), triggers are event-driven.
#
# Types: webhook (receives HTTP POST), event (reacts to integration events)
# Sources: github, stripe, linear, telegram, discord, custom
# Action types: skill, prompt, script

