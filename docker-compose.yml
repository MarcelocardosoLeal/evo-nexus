  # Runner on-demand — to execute routines manually
  # Usage: docker compose run --rm runner ADWs/routines/good_morning.py
  runner:
    build: .
    container_name: evonexus-runner-local
    labels:
      - "com.evonexus.environment=local"
    env_file: .env
    environment:
      - TZ=America/Sao_Paulo
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - daily-logs-local:/workspace/workspace/daily-logs
      - projects-local:/workspace/workspace/projects
      - community-local:/workspace/workspace/community
      - financial-local:/workspace/workspace/finance
      - personal-local:/workspace/workspace/personal
      - meetings-local:/workspace/workspace/meetings
      - strategy-local:/workspace/workspace/strategy
      - memory:/workspace/memory
      - adw-logs:/workspace/ADWs/logs
      - agent-memory:/workspace/.claude/agent-memory
    profiles:
      - manual

volumes:
  evonexus-db-local:
  daily-logs-local:
  projects-local:
  community-local:
  financial-local:
  personal-local:
