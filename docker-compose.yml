services:
  # Dashboard — Flask + React (single container)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: evonexus-dashboard-local
    labels:
      - "com.evonexus.environment=local"
    ports:
      - "${EVONEXUS_PORT:-8080}:8080"
    env_file: .env
    environment:
      - TZ=America/Sao_Paulo
      - EVONEXUS_PORT=8080
    volumes:
      - ./.env:/workspace/.env
      - ./config:/workspace/config
      - ./workspace:/workspace/workspace
      - evonexus-db-local:/workspace/dashboard/data
      - ./.claude/agents:/workspace/.claude/agents:ro
      - ./.claude/skills:/workspace/.claude/skills:ro
      - ./.claude/commands:/workspace/.claude/commands:ro
      - ./.claude/templates:/workspace/.claude/templates:ro
      - ./memory:/workspace/memory
      - ./ADWs/logs:/workspace/ADWs/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

